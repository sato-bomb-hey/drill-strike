<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>蒼穹の歴史戦線 〜覚醒のレジェンドナイン〜</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ========== タイトル画面 ========== -->
<div id="title-screen" class="screen active">
  <div class="title-bg-effect"></div>
  <div class="title-content">
    <div class="title-emblem">⚔</div>
    <h1 class="title-logo">蒼穹の歴史戦線</h1>
    <p class="title-sub">〜覚醒のレジェンドナイン〜</p>
    <div class="title-stats" id="title-stats"></div>
    <div class="title-buttons">
      <button class="btn-primary" onclick="showScreen('field-select-screen')">
        <span class="btn-icon">⚔</span> 出陣する
      </button>
      <button class="btn-secondary" onclick="showScreen('team-screen')">
        <span class="btn-icon">👥</span> チーム編成
      </button>
      <button class="btn-secondary" onclick="showScreen('gacha-screen')">
        <span class="btn-icon">✨</span> 英雄召喚
      </button>
      <button class="btn-ghost" onclick="showScreen('review-screen')">
        <span class="btn-icon">📜</span> 呪縛された記憶
      </button>
    </div>
  </div>
</div>

<!-- ========== 分野選択画面 ========== -->
<div id="field-select-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('title-screen')">◀ 戻る</button>
    <h2 class="screen-title">戦場を選べ</h2>
  </div>
  <div class="field-select-content">
    <p class="field-select-desc">汝が挑む封印の扉を選択せよ</p>
    <div class="field-cards">
      <button class="field-card" onclick="startBattle('geography')">
        <div class="field-card-icon">🌍</div>
        <div class="field-card-name">大地の記憶</div>
        <div class="field-card-sub">地理</div>
        <div class="field-card-desc">世界の地形・気候・産業の封印を解け</div>
      </button>
      <button class="field-card" onclick="startBattle('history')">
        <div class="field-card-icon">⚔️</div>
        <div class="field-card-name">時の封印</div>
        <div class="field-card-sub">歴史</div>
        <div class="field-card-desc">日本史の謎と封じられた英雄を解放せよ</div>
      </button>
    </div>
  </div>
</div>

<!-- ========== バトル画面 ========== -->
<div id="battle-screen" class="screen">
  <!-- 敵エリア -->
  <div class="enemy-area">
    <div class="enemy-info">
      <span class="enemy-name" id="enemy-name">忘却の魔獣</span>
      <span class="enemy-stage" id="enemy-stage">STAGE 1</span>
    </div>
    <div class="hp-bar-wrap enemy-hp-wrap">
      <div class="hp-bar-label">ENEMY HP</div>
      <div class="hp-bar-outer">
        <div class="hp-bar enemy-hp-bar" id="enemy-hp-bar"></div>
      </div>
      <span class="hp-num" id="enemy-hp-num">100</span>
    </div>
    <div class="enemy-figure" id="enemy-figure">💀</div>
    <div class="damage-effect" id="damage-effect"></div>
  </div>

  <!-- プレイヤーHUD -->
  <div class="player-hud">
    <div class="hp-bar-wrap player-hp-wrap">
      <div class="hp-bar-label">HP</div>
      <div class="hp-bar-outer">
        <div class="hp-bar player-hp-bar" id="player-hp-bar"></div>
      </div>
      <span class="hp-num" id="player-hp-num">100</span>
    </div>
    <div class="hud-right">
      <div class="combo-display">
        <span class="combo-label">COMBO</span>
        <span class="combo-num" id="combo-num">0</span>
      </div>
      <div class="orb-display">
        <span class="orb-icon">💎</span>
        <span id="hud-orbs">0</span>
      </div>
    </div>
  </div>

  <!-- 必殺技ゲージ -->
  <div class="special-gauge-wrap">
    <div class="special-gauge-label">必殺技ゲージ</div>
    <div class="special-gauge-outer">
      <div class="special-gauge-bar" id="special-gauge-bar"></div>
    </div>
    <button class="special-btn" id="special-btn" onclick="activateSpecial()" disabled>
      ⚡ 必殺技発動！
    </button>
  </div>

  <!-- 問題エリア -->
  <div class="question-area">
    <div class="question-num" id="question-num">Q1 / 10</div>
    <div class="question-text" id="question-text">問題文がここに入ります</div>
  </div>

  <!-- 選択肢（画面下部・大きく） -->
  <div class="choices-area" id="choices-area"></div>

  <!-- フィードバック -->
  <div class="battle-feedback" id="battle-feedback"></div>
</div>

<!-- ========== 必殺技演出オーバーレイ ========== -->
<div id="special-overlay" class="special-overlay">
  <div class="special-content">
    <div class="special-name" id="special-name">漆黒の絶対領域</div>
    <div class="special-flash"></div>
  </div>
</div>

<!-- ========== コンボ演出 ========== -->
<div id="combo-overlay" class="combo-overlay"></div>

<!-- ========== バトル結果画面 ========== -->
<div id="battle-result-screen" class="screen">
  <div class="result-content">
    <div class="result-title" id="result-title">VICTORY!!</div>
    <div class="result-subtitle" id="result-subtitle"></div>
    <div class="result-stats" id="result-stats"></div>
    <div class="result-orbs" id="result-orbs"></div>
    <div class="result-buttons">
      <button class="btn-primary" id="result-gacha-btn" onclick="goToGacha()">
        ✨ 英雄召喚へ
      </button>
      <button class="btn-secondary" onclick="showScreen('field-select-screen')">
        ⚔ 再挑戦
      </button>
      <button class="btn-ghost" onclick="showScreen('title-screen')">
        ⌂ タイトル
      </button>
    </div>
  </div>
</div>

<!-- ========== ガチャ画面 ========== -->
<div id="gacha-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('title-screen')">◀ 戻る</button>
    <h2 class="screen-title">英雄召喚</h2>
  </div>
  <div class="gacha-content">
    <div class="gacha-orb-display">
      <span class="orb-icon-large">💎</span>
      <span class="gacha-orb-num" id="gacha-orb-num">0</span>
      <span class="gacha-orb-label">オーブ</span>
    </div>
    <div class="gacha-machine">
      <div class="gacha-circle" id="gacha-circle">✨</div>
      <div class="gacha-cost">消費: 10オーブ</div>
    </div>
    <div id="gacha-result-area" class="gacha-result-area" style="display:none"></div>
    <div class="gacha-buttons">
      <button class="btn-primary gacha-btn" id="gacha-btn" onclick="doGacha()">
        ✨ 召喚する (10オーブ)
      </button>
    </div>
    <div class="collection-title">所持英雄</div>
    <div class="collection-grid" id="collection-grid"></div>
  </div>
</div>

<!-- ========== チーム編成画面 ========== -->
<div id="team-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('title-screen')">◀ 戻る</button>
    <h2 class="screen-title">俺の最強チーム</h2>
  </div>
  <div class="team-content">
    <div class="team-power-display">
      <span class="team-power-label">チーム戦力</span>
      <span class="team-power-num" id="team-power-num">0</span>
    </div>
    <div class="team-grid" id="team-grid"></div>
    <div class="bench-title">控えメンバー</div>
    <div class="bench-grid" id="bench-grid"></div>
  </div>
</div>

<!-- ========== 復習画面 ========== -->
<div id="review-screen" class="screen">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('title-screen')">◀ 戻る</button>
    <h2 class="screen-title">呪縛された記憶</h2>
  </div>
  <div class="review-content">
    <p class="review-desc">間違えた問題の封印を解き放て</p>
    <div class="review-list" id="review-list"></div>
  </div>
</div>

<!-- キャラ詳細モーダル -->
<div id="char-modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-char-icon" id="modal-char-icon"></div>
    <div class="modal-char-rarity" id="modal-char-rarity"></div>
    <div class="modal-char-name" id="modal-char-name"></div>
    <div class="modal-char-stats" id="modal-char-stats"></div>
    <div class="modal-buttons">
      <button class="btn-primary" id="modal-team-btn" onclick="toggleTeamMember()">スタメン登録</button>
      <button class="btn-ghost" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
